# Deploys the Next.js static export to GitHub Pages on every push to main.
#
# How it works:
#   1. Checkout, install deps, run `next build` — produces the `out/` folder
#      because next.config.ts has `output: "export"`.
#   2. Upload the `out/` folder as a Pages artifact.
#   3. Deploy that artifact to the repo's GitHub Pages site.
#
# After the first successful run, the site will be live at:
#   https://<your-github-username>.github.io/<repo-name>/
#
# IMPORTANT — one-time GitHub setting required:
#   Go to your repo on GitHub → Settings → Pages
#   Under "Build and deployment" → Source: select "GitHub Actions"
#   (Not "Deploy from a branch" — that's the old method that serves
#    raw repo files like index.html.)
#
# The workflow has the minimum permissions GitHub Pages needs and
# uses the `pages` concurrency group so concurrent pushes don't clash.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Allow manual triggering from the Actions tab if a deploy needs redoing.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy can run at a time. New pushes cancel an in-progress
# deploy rather than queueing.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (static export)
        env:
          # Tell Next.js the site is hosted at /<repo-name>/ on GitHub Pages
          # rather than the root of the domain. Required so JS / CSS / image
          # paths resolve correctly.
          NEXT_PUBLIC_BASE_PATH: /AsterTest
        run: npm run build

      # Add a `.nojekyll` file so GitHub Pages serves files / folders that
      # start with an underscore (Next outputs to `_next/`).
      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
